<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌕</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌕 Mickleball App v1.69</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <h1 class="title">Mickleball App v1.69 🥒</h1>

  <div class="panel glass">
    <input id="playerName" placeholder="Add player name"/>
    <button onclick="addPlayer()">Add Player</button>
  </div>


<div class="panel glass">
  <h2>Courts Control</h2>
  <button onclick="addCourt()" style="background: #28a745; color: white; width: 100%;">+ Add New Court</button>
  <div id="courtsWrapper" class="courts-grid">
    <!-- Multiple courts will appear here -->
  </div>
</div>

  <div class="panel glass">
    <h2>Players</h2>
    <div id="playerList"></div>
  </div>

  <div class="panel glass">
    <h2>Leaderboard</h2>
    <div id="leaderboard"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
